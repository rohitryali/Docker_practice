<!DOCTYPE html>
<html>
<head>
  <title>PrimeBuild Dashboard</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      display: flex;
      background: #0f172a;
      color: white;
    }

    /* SIDEBAR */
    .sidebar {
      width: 250px;
      height: 100vh;
      background: #111827;
      padding: 20px;
    }

    .sidebar h2 {
      margin-bottom: 30px;
      font-size: 20px;
      color: #38bdf8;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .menu a {
      text-decoration: none;
      color: #cbd5e1;
      padding: 10px;
      border-radius: 8px;
    }

    .menu a:hover {
      background: #1e293b;
      color: white;
    }

    /* MAIN */
    .main {
      flex: 1;
      padding: 30px;
    }

    /* CARDS */
    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
    }

    .card h3 {
      color: #38bdf8;
    }

    /* FORM */
    .form {
      margin-top: 30px;
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      width: 400px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      margin-top: 15px;
      width: 100%;
      padding: 10px;
      background: #22c55e;
      border: none;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    /* TOP BAR */
    .topbar {
      margin-bottom: 20px;
    }

    .message {
      color: #22c55e;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>🏗 PrimeBuild</h2>
  <div class="menu">
    <a href="#">Dashboard</a>
    <a href="#">Projects</a>
    <a href="#">Customers</a>
    <a href="#">Budget</a>
    <a href="#">Reports</a>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="topbar">
    <h1>Construction Dashboard</h1>
    <p>Manage all your building projects professionally</p>
  </div>

  <!-- STATS CARDS -->
  <div class="cards">
    <div class="card">
      <h3>Active Projects</h3>
      <p>12 Projects running</p>
    </div>

    <div class="card">
      <h3>Total Budget</h3>
      <p>₹1.2 Crore</p>
    </div>

    <div class="card">
      <h3>Completed</h3>
      <p>45 Houses</p>
    </div>
  </div>

  <!-- FORM -->
  <div class="form">
    <h3>Add New Project</h3>

    <form method="POST" action="/submit">
      <input name="name" placeholder="Customer Name">

      <select name="project">
        <option>House Construction</option>
        <option>Renovation</option>
        <option>Interior Design</option>
      </select>

      <input name="budget" placeholder="Budget (₹)">

      <button type="submit">Save Project</button>
    </form>

    {% if message %}
      <div class="message">{{ message }}</div>
    {% endif %}
  </div>

</div>

</body>
</html>
